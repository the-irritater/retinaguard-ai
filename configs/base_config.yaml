# -
# RetinaGuard AI - Base Configuration
# -
# This is a research prototype. Not a diagnostic tool.
# -

project:
  name: "RetinaGuard AI"
  version: "1.0.0"
  description: "Explainable deep-learning system for DR screening research"
  disclaimer: >
    This system is an academic research prototype. It is NOT a medical device,
    has NOT received regulatory approval, and MUST NOT be used for clinical
    diagnosis, treatment decisions, or patient management.

# -
# Paths (relative to project root)
# -
paths:
  data_root: "data/raw"
  interim_dir: "data/interim"
  processed_dir: "data/processed"
  metadata_dir: "data/metadata"
  checkpoint_dir: "models/checkpoints"
  exported_dir: "models/exported"
  figures_dir: "reports/figures"
  tables_dir: "reports/tables"
  reports_dir: "reports"

# -
# IDRiD dataset expected structure inside data/raw/
# -
dataset:
  name: "IDRiD"
  # Expected subdirectory names - adjust if your download names differ
  train_images_dir: "1. Original Images/a. Training Set"
  test_images_dir: "1. Original Images/b. Testing Set"
  lesion_masks_dir: "2. All Segmentation Groundtruths"
  labels_dir: "3. Disease Grading"
  train_labels_csv: "a. IDRiD_Disease Grading_Training Labels.csv"
  test_labels_csv: "b. IDRiD_Disease Grading_Testing Labels.csv"
  image_extensions: [".jpg", ".jpeg", ".png", ".tif", ".tiff"]
  # Columns in the label CSVs
  image_id_col: "Image name"
  dr_grade_col: "Retinopathy grade"
  dme_grade_col: "Risk of macular edema "  # Note: trailing space in original

# -
# Binary target definition
# -
binary_target:
  name: "DR grade ≥2"
  description: >
    Study-specific operational definition for binary classification.
    DR grades 0-1 → Class 0 (DR grade < 2).
    DR grades 2-4 → Class 1 (DR grade ≥ 2).
    This is NOT a universal clinical referral standard.
  negative_grades: [0, 1]
  positive_grades: [2, 3, 4]
  negative_label: "DR grade < 2"
  positive_label: "DR grade >= 2"

# -
# Reproducibility
# -
seed: 42

# -
# Data splitting
# -
splitting:
  # Official IDRiD split is preserved
  # CV folds created only from official training set
  n_folds: 5
  stratify_by: "binary_label"
  # Patient-level split not available in IDRiD
  patient_level: false
  patient_level_note: >
    IDRiD documentation describes deidentified, renamed images and does not
    provide a clearly documented patient-grouping variable. Patient-level
    leakage cannot be independently verified.

# -
# Preprocessing
# -
preprocessing:
  # Resolution experiment: compare 224, 384, 512 via CV
  image_size: 384
  image_sizes_experiment: [224, 384, 512]
  # ImageNet normalisation values
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  # Black border cropping
  border_threshold: 10  # pixel intensity threshold for border detection
  min_crop_ratio: 0.5   # minimum ratio to preserve (safety)

# -
# Augmentation - medically conservative, NO horizontal flip
# -
augmentation:
  # Horizontal flip EXCLUDED from baseline (changes retinal laterality)
  horizontal_flip: false
  horizontal_flip_note: >
    Horizontal flipping changes retinal laterality and swaps optic-disc
    and macular orientation. Excluded from baseline; available only as
    ablation experiment.
  rotation_limit: 15
  translate_percent: 0.05
  scale_range: [0.9, 1.1]
  brightness_limit: 0.1
  contrast_limit: 0.1

# -
# Training
# -
training:
  # Two-stage transfer learning
  stage1:
    epochs: 30
    learning_rate: 1.0e-3
    freeze_backbone: true
  stage2:
    epochs: 50
    learning_rate: 1.0e-4
    unfreeze_layers: "layer4"  # architecture-specific
  # Common settings
  optimizer: "adamw"
  weight_decay: 1.0e-4
  batch_size: 16
  num_workers: 4
  gradient_clip_max_norm: 1.0
  mixed_precision: true
  early_stopping:
    patience: 10
    min_delta: 0.001
    monitor: "val_auc"
  scheduler:
    name: "cosine"
    T_max: 50
    eta_min: 1.0e-6

# -
# Loss
# -
loss:
  primary: "weighted_cross_entropy"
  # Focal loss as sensitivity analysis
  focal:
    gamma: 2.0
    alpha: null  # compute from class frequencies

# -
# Threshold selection (validation set only)
# -
threshold:
  methods: ["youden", "sensitivity_target", "fixed"]
  sensitivity_target: 0.90
  fixed_value: 0.50
  selection_note: >
    Threshold is selected using validation data only.
    The test set is never used for threshold selection.

# -
# Evaluation
# -
evaluation:
  bootstrap:
    n_resamples: 2000
    confidence_level: 0.95
    random_state: 42
  calibration:
    n_bins: 10
    method: "temperature_scaling"
    fit_on: "validation"

# -
# Explainability
# -
explainability:
  method: "grad-cam"
  target_layer: null  # set automatically per architecture
  disclaimer: >
    The highlighted regions influenced the model's prediction.
    They are not confirmed lesion boundaries.
  n_samples_per_category: 5
  categories: ["TP", "TN", "FP", "FN", "high_confidence_error"]
